name: Update PAC

permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get servers and generate PAC
        run: |
          # Скачиваем список (флаг -k, если сертификат не на IP)
          curl -sk https://188.166.142.39/servers/list > servers.json
          
          # Извлекаем данные одним проходом
          SERVER_DATA=$(jq -r '.[] | select(.name=="Netherlands") | "\(.host) \(.port)"' servers.json | head -n1)
          
          if [ -z "$SERVER_DATA" ]; then
            echo "Server not found"
            exit 1
          fi

          read -r HOST PORT <<< "$SERVER_DATA"
          
          echo "function FindProxyForURL(url, host) { return \"PROXY $HOST:$PORT; DIRECT\"; }" > proxy.pac
          date +%s > proxy.version

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add proxy.pac proxy.version
          
          # Коммитим только если есть изменения, чтобы не плодить пустые запуски
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update PAC [$(date -u +'%Y-%m-%d %H:%M:%S')]"
            git push
          fi
